<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<style>
    :root {
        --primery-Navy: hsl(233, 47%, 7%);
        --primery-Blue: hsl(244, 37%, 16%);
        --primery-Purple: hsl(277, 64%, 61%);
        --font-size: 15px;
        --padding: 15px;
        --primery-heading: hsl(0, 0%, 100%);
        --primery-paragraph: hsla(0, 0%, 100%, 0.75);
        --primery-stat: hsla(0, 0%, 100%, 0.6)
    }

    body {
        box-sizing: border-box;
        font-size: 15px;
    }

    main {
        width: 375px;
        height: 956px;
        padding: var(--padding);
        background: var(--primery-Navy);
        position: relative;
    }

    .container {
        width: 90%;
        height: 90%;
        border-radius: 10px;
        position: absolute;
        background: var(--primery-Blue);
        border-radius: 10px;
    }

    .card {
        font-size: var(--font-size);
        width: 100%;

    }

    .card h1 {
        font-family: "Inter", sans-serif;
        color: var(--primery-heading);
        text-align: center;
        font-size: 35px;
        padding: 5px;
    }

    .card p {
        font-family: "Lexend Deca", sans-serif;
        color: var(--primery-paragraph);
        text-align: center;
        font-size: 15px;
        padding: 5px;
    }

    .card .heding {
        color: var(--primery-Purple);

    }

    ul {
        display: column;
        margin-right: 15px;
        list-style: none;
        text-align: center;
    }

    ul li {
        display: flex;
        padding-top: 25px;
        flex-direction: column;
        align-content: space-around;

    }

    .number {
        font-family: "Inter", sans-serif;
        font-weight: 100%;
        font-size: 40px;
        color: var(--primery-heading);
    }

    .label {
        text-transform: uppercase;
        font-size: 10px;
        font-family: "Inter", sans-serif;
        letter-spacing: 0.5px;
        color: var(--primery-stat);
    }

    .card_image {
        position: relative;
        display: inline-block;

    }

    .card_image img {
        width: 100%;
        display: block;
        color: var(--primery-Purple);
        border-radius: 10px 10px 0px 0px;
    }

    .card_image::after {
        content: "";
        position: absolute;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background-color: var(--primery-Purple);
        opacity: 0.3;
        pointer-events: none;
        border-radius: 10px 10px 0px 0px;
    }
</style>

<body>
    <main>
        <div class="container">
            <div class="card_image">
                <img src="/images/image-header-desktop.jpg" alt="image">
            </div>
            <div class="card">

                <h1>Get <span class="heding">insights</span> that help your business grow.</h1>
                <p>Discover the benefits of data analytics and make better decisions regarding revenue, customer
                    experience, and overall efficiency.</p>
                <ul>
                    <li>
                        <span class="number">10K+</span>
                        <span class="label">Companies</span>
                    </li>
                    <li>
                        <span class="number">314</span>
                        <span class="label">Templates</span>
                    </li>
                    <li>
                        <span class="number">12M+</span>
                        <span class="label">Queries</span>
                    </li>
                </ul>
            </div>

        </div>
    </main>
</body>

</html>
