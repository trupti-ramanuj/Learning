<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&family=Lexend+Deca:wght@100..900&display=swap"
        rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Lexend+Deca:wght@100..900&display=swap" rel="stylesheet">
    <style>
        :root {
            --primery-Navy: hsl(233, 47%, 7%);
            --primery-Blue: hsl(244, 37%, 16%);
            --primery-Purple: hsl(277, 64%, 61%);
            --font-size: 15px;
            --padding: 15px;
            --primery-heading: hsl(0, 0%, 100%);
            --primery-paragraph: hsla(0, 0%, 100%, 0.75);
            --primery-stat: hsla(0, 0%, 100%, 0.6)
        }

        body {
            box-sizing: border-box;
            font-size: 15px;
        }

        main {
            width: 1440px;
            height: 800px;
            padding: var(--padding);
            border: 1px solid black;
            background: var(--primery-Navy);
            position: relative;

        }

        .container {
            width: 75%;
            height: 500px;
            margin: 200px 200px;
            border-radius: 10px;
            background: var(--primery-Blue);
            display: flex;
            justify-content: space-between;
            align-content: center;
        }

        .card {
            padding: 40px;
            font-size: var(--font-size);
            width: 50%;
            display: grid;
        }

        .card h1 {
            font-family: "Inter", sans-serif;
            color: var(--primery-heading);
            margin: 50px;
            font-size: 35px;
        }

        .card p {
            font-family: "Lexend Deca", sans-serif;
            color: var(--primery-paragraph);
            margin: 50px;
            font-size: 15px;
        }

        .card .heding {
            color: var(--primery-Purple);

        }

        ul {

            display: flex;
            gap: 2rem;
            list-style: none;

        }

        ul li {
            display: flex;
            flex-direction: column;
            gap: 0.5rem;
        }

        .number {
            font-family: "Inter", sans-serif;
            font-weight: 700;
            font-size: 30px;
            color: var(--primery-heading);
        }

        .label {
            text-transform: uppercase;
            font-size: 0.8rem;
            font-family: "Inter", sans-serif;
            letter-spacing: 0.5px;
            color: var(--primery-stat);
        }

        .card_image {
            position: relative;
            display: inline-block;
        }

        .card_image img {
            width: 100%;
            height: 100%;
            display: block;
            color: var(--primery-Purple);
            border-radius: 0px 10px 10px 0px;
        }

        .card_image::after {
            content: "";
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: var(--primery-Purple);
            opacity: 0.3;
            pointer-events: none;


        }

        @media (max-width: 900px) {
            .container {
                grid-template-columns: 1fr;
            }

            .card {
                grid-template-columns: 1fr;
            }

            .card_image {
                min-height: 300px;
                order: -1;
            }
        }

        @media (max-width:600px) {
            main {
                width: 375px;
                height: 956px;
                display: flex;
                justify-content: center;
                align-items: center;
            }

            .container {
                width: 100%;
                height: 90%;
                border-radius: 10px;
                display: grid;
                grid-template-columns: 1fr;
                text-align: center;
            }

            .card {
                padding-top: 2px;
                width: 90%;
            }

            .card h1 {
                font-size: 20px;
            }

            .card p {
                font-size: 9px;
            }

            .card .heding {
                color: var(--primery-Purple);
            }

            ul {
                display: block;
                text-align: center;
            }

            ul li {
                padding-right: 5px;
                flex-direction: column;
            }

            .number {
                font-family: "Inter", sans-serif;
                font-weight: 100%;
                font-size: 40px;
                color: var(--primery-heading);
            }

            .label {
                font-size: 10px;
                letter-spacing: 0.5px;
            }

            .card_image {
                order: -1;
            }

            .card_image img {
                width: 100%;
                border-radius: 10px 10px 0px 0px;
            }

            .card_image::after {
                border-radius: 10px 10px 0px 0px;
            }


        }
    </style>
</head>

<body>
    <main>
        <div class="container">
            <div class="card">
                <h1>Get <span class="heding">insights</span> that help your business grow.</h1>
                <p>Discover the benefits of data analytics and make better decisions regarding revenue, customer
                    experience, and overall efficiency.</p>
                <ul>
                    <li>
                        <span class="number">10K+</span>
                        <span class="label">Companies</span>
                    </li>
                    <li>
                        <span class="number">314</span>
                        <span class="label">Templates</span>
                    </li>
                    <li>
                        <span class="number">12M+</span>
                        <span class="label">Queries</span>
                    </li>
                </ul>
            </div>
            <div class="card_image">
                <img src="/images/image-header-desktop.jpg" alt="image">
            </div>
        </div>
    </main>
</body>

</html>
