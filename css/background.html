<!DOCTYPE html>
<html>

<head>
    <style>
        body {
            /* Color formats */
            background-color: rgba(255, 87, 51, 0.8);

            /* Gradient over image */
            background-image:
                linear-gradient(to bottom right, rgba(255, 87, 51, 0.7), rgba(51, 193, 255, 0.7)),
                url("/images/favicon.jpg");

            /* Background properties */
            background-repeat: no-repeat;
            background-size: cover;
            background-position: center;
        }
    </style>
</head>

<body>
    <h1>CSS Background Demo</h1>
</body>

</html>
