<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CSS Variables Example</title>
    <link rel="stylesheet" href="variable.css">
</head>

<body>

    <h1>CSS Variables Example</h1>

    <div class="card">
        <h2>Welcome</h2>
        <p>This card uses CSS Variables.</p>
        <button>Click Me</button>
    </div>

    <div class="card special">
        <h2>Special Card</h2>
        <p>This card overrides the primary color.</p>
        <button>Buy Now</button>
    </div>

    <div class="fallback">
        <h2>Fallback Example</h2>
        <p>If variable doesn't exist, fallback color is used.</p>
    </div>

</body>

</html>
