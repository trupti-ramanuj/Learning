<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <title>Document</title>
    ,
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <h1 class="text-red-900 bg-blue-500">Hello</h1>
    <h1 class="bg-gray-600 text-blue"> heading</h1>
    <div class="font-bold bg-slate-400"> bold font</div>
    <div class="font-extrabold bg-zinc-500"> extra bold font</div>
    <div class="font-normal hover:font-bold bg-netural">normal font with hover bold font</div>
    <div class="font-normal focus:font-bold">bold font with focus bold font</div>
    <div class="font-normal first-child:font-bold">bold font with first child bold</div>
    <div class="font-normal lg:font-bold">normal font with large screen bold font</div>
    <div class="font-normal md:font-bold">bold font with medium screen bold font</div>
    <div class="bg-green-500 font-bold sm:font-normal">bold font with small screen normal font</div>
</body>

</html>
