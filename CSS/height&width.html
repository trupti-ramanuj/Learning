<!DOCTYPE html>
<html>

<head>
    <style>
        div {
            height: 100px;
            width: 500px;
            background-color: powderblue;
        }

        .div1 {
            max-width: 500px;
            padding: 10px;
            background-color: powderblue;
        }

        .div2 {
            width: 500px;
            padding: 10px;
            background-color: powderblue;
        }
    </style>
</head>

<body>

    <h2>Set the height and width of an element</h2>

    <div>This div element has a height of 100px and a width of 500px.</div>

    <div class="div1">max-width of 500px</div>

    <br>

    <div class="div2">width of 500px.</div>
</body>

</html>
